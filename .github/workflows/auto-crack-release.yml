name: Auto crack release

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 'Upstream tag to package. Empty means latest v1.* tag.'
        required: false
        type: string
      force:
        description: 'Overwrite existing crack tag and release.'
        required: false
        type: boolean
        default: false

  schedule:
    - cron: '17 3 * * *'

concurrency:
  group: auto-crack-release
  cancel-in-progress: false

jobs:
  Prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    outputs:
      should_build: ${{ steps.prepare.outputs.should_build }}
      upstream_tag: ${{ steps.prepare.outputs.upstream_tag }}
      crack_tag: ${{ steps.prepare.outputs.crack_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare crack tag
        id: prepare
        shell: bash
        env:
          INPUT_UPSTREAM_TAG: ${{ github.event.inputs.upstream_tag || '' }}
          INPUT_FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          set -euo pipefail

          patch_base_tag="v1.17.7"
          patch_branch="crack-patches"
          upstream_tag_pattern="v1.*"
          upstream_repo="https://github.com/sandboxie-plus/Sandboxie.git"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream "$upstream_repo" 2>/dev/null || git remote set-url upstream "$upstream_repo"

          echo "Fetching upstream. Git output is shown below."
          git fetch upstream --tags --prune
          git fetch origin "$patch_branch" --tags --prune

          upstream_tag="${INPUT_UPSTREAM_TAG:-}"
          if [[ -z "$upstream_tag" ]]; then
            upstream_tag="$(git tag --sort=-version:refname --list "$upstream_tag_pattern" | head -n 1)"
          fi
          upstream_tag="${upstream_tag#refs/tags/}"

          if [[ -z "$upstream_tag" ]]; then
            echo "No upstream tag found."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "$upstream_tag" != v1.* ]]; then
            echo "Ignoring unsupported upstream tag '$upstream_tag'. Expected a tag matching '$upstream_tag_pattern'."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git rev-parse -q --verify "refs/tags/$upstream_tag" >/dev/null
          git rev-parse -q --verify "refs/tags/$patch_base_tag" >/dev/null
          git rev-parse -q --verify "refs/remotes/origin/$patch_branch" >/dev/null

          crack_tag="crack/$upstream_tag"
          force="${INPUT_FORCE:-false}"

          if git ls-remote --exit-code --tags origin "refs/tags/$crack_tag" >/dev/null 2>&1; then
            if [[ "$force" == "true" ]]; then
              git push origin ":refs/tags/$crack_tag"
              git tag -d "$crack_tag" 2>/dev/null || true
            else
              echo "Tag '$crack_tag' already exists on origin. Nothing to do."
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"
              echo "crack_tag=$crack_tag" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          mapfile -t patch_commits < <(git rev-list --reverse --no-merges "$patch_base_tag..refs/remotes/origin/$patch_branch")
          if [[ "${#patch_commits[@]}" -eq 0 ]]; then
            echo "Patch range '$patch_base_tag..origin/$patch_branch' is empty."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          build_branch="build-${crack_tag//\//-}"
          if git show-ref --verify --quiet "refs/heads/$build_branch"; then
            if [[ "$force" == "true" ]]; then
              git branch -D "$build_branch"
            else
              echo "Local build branch '$build_branch' already exists. Nothing to do."
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"
              echo "crack_tag=$crack_tag" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          git switch -c "$build_branch" "refs/tags/$upstream_tag"
          git cherry-pick "${patch_commits[@]}"
          git tag -d "$crack_tag" 2>/dev/null || true
          git tag "$crack_tag"
          git push origin "refs/tags/$crack_tag"

          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"
          echo "crack_tag=$crack_tag" >> "$GITHUB_OUTPUT"

  Package_Release:
    needs: Prepare
    if: needs.Prepare.outputs.should_build == 'true'
    uses: ./.github/workflows/main-driver-only.yml
    permissions:
      contents: write
    with:
      checkout_ref: ${{ needs.Prepare.outputs.crack_tag }}
      publish_release: true
      release_tag: ${{ needs.Prepare.outputs.crack_tag }}
      release_title: ${{ needs.Prepare.outputs.upstream_tag }}
